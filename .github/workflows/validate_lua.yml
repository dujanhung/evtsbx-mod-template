name: validate Lua
on:
 workflow_dispatch:
 pull_request:
  paths:
   - '**.lua'
env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
 validate:
  runs-on: ubuntu-latest
  steps:
   - name: checkout repo
     uses: actions/checkout@v5
   - name: setup Lua
     uses: leafo/gh-actions-lua@v11
   - name: setup Luacheck
     uses: leafo/gh-actions-luacheck@v11
   - name: syntax check
     run: luacheck *.lua