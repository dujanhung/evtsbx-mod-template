name: validate Lua
on:
 workflow_dispatch:
 pull_request:
  paths:
   - '**.lua'
env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
 validate:
  runs-on: ubuntu-latest
  steps:
   - name: checkout repo
     uses: actions/checkout@v5
   - name: install Luarocks
     run: sudo apt-get install luarocks
   - name: install Luacheck
     run: sudo luarocks install luacheck
   - name: syntax check
     run: luacheck *.lua