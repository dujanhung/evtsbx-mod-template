name: validate JSON
on:
 workflow_dispatch:
env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
 validate-json:
  runs-on: ubuntu-latest
  steps:
   - name: get checkout
     uses: actions/checkout@v5
   - name: validate
     run: |
      for file in *.json; do
       echo "check $file"
       jq empty "$file"
       echo "validated $file"