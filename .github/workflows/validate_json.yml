name: validate JSON
on:
 workflow_dispatch:
env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
 validate-json:
  runs-on: ubuntu-latest
  steps:
   - name: checkout repo
     uses: actions/checkout@v5
   - name: syntax check
     run: |
      file="info.json"
      echo "open $file"
      jq empty "$file"
      echo "validated $file"
   - name: checkout external repo
     uses: actions/checkout@v4
     with:
      repository: dujanhung/json-validator
      path: json-validator
   - name: Copy file
     run: cp json-validator/script.py .