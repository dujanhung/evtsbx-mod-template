name: gitmodules pipeline
on:
 workflow_dispatch:
 push:
  paths:
   - ".gitmodules"
jobs:
 check-files:
  runs-on: ubuntu-latest
  steps:
   - name: checkout repo
     uses: actions/checkout@v4
   - name: ensure required files exist
     run: |
      REQUIRED_FILES=(
       ".gitmodules"
       ".github/scripts/validate_gitmodules.py"
       ".github/scripts/prepare_folders.py"
       ".github/scripts/clone_submodules.sh"
      )
      for file in "${REQUIRED_FILES[@]}"; do
       if [ ! -f "$file" ]; then
        echo "ERROR: missing file: $file"
        exit 1
       fi
      done
      echo "All required files found."
 validate-scripts:
  runs-on: ubuntu-latest
  needs: check-files
  steps:
   - name: checkout repo
     uses: actions/checkout@v4
   - name: set up Python
     uses: actions/setup-python@v5
     with:
      python-version: "3.x"
   - name: validate Python syntax
     run: |
      python -m py_compile .github/scripts/*.py
   - name: validate Bash syntax
     run: |
      bash -n .github/scripts/*.sh
 make-executable:
  runs-on: ubuntu-latest
  needs: validate-scripts
  steps:
   - name: checkout repo
     uses: actions/checkout@v4
   - name: make Bash scripts executable
     run: |
      chmod +x .github/scripts/*.sh
   - name: verify permissions
     run: |
      ls -l .github/scripts/*.sh
 validate-gitmodules:
  runs-on: ubuntu-latest
  needs: make-executable
  steps:
   - name: checkout repo
     uses: actions/checkout@v4
   - name: validate .gitmodules
     run: python .github/scripts/validate_gitmodules.py
 prepare:
  runs-on: ubuntu-latest
  needs: validate-gitmodules
  steps:
   - name: checkout repo
     uses: actions/checkout@v4
   - name: prepare folders
     run: python .github/scripts/prepare_folders.py
 clone:
  runs-on: ubuntu-latest
  needs: prepare
  steps:
   - name: checkout repo
     uses: actions/checkout@v4
     with:
      fetch-depth: 0
   - name: clone submodules
     run: |
      chmod +x .github/scripts/*.sh
      ls -l .github/scripts/*.sh
      .github/scripts/clone_submodules.sh
 cleanup-placeholders:
  runs-on: ubuntu-latest
  needs: clone
  steps:
   - name: checkout repo
     uses: actions/checkout@v4
   - name: remove placeholder files
     run: |
      find . -type f -name "a.txt" -delete
 commit-changes:
  runs-on: ubuntu-latest
  needs: cleanup-placeholders
  env:
   SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
   SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
  steps:
   - name: checkout repo
     uses: actions/checkout@v4
     with:
      fetch-depth: 0
   - name: setup ssh
     run: |
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
      chmod 600 ~/.ssh/id_rsa
      ssh-keyscan github.com >> ~/.ssh/known_hosts
      eval "$(ssh-agent -s)"
      export SSH_ASKPASS=$(mktemp)
      cat > "$SSH_ASKPASS" <<EOF
      #!/usr/bin/env bash
      echo "$SSH_PASSPHRASE"
      EOF
      chmod +x "$SSH_ASKPASS"
      DISPLAY=:0 SSH_ASKPASS="$SSH_ASKPASS" setsid ssh-add ~/.ssh/id_rsa < /dev/null
      rm -f "$SSH_ASKPASS"
   - name: commit
     run: |
      git config --local user.name "github-actions[bot]"
      git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
      git add .
      if git diff --cached --quiet; then
       echo "No changes to commit."
       exit 0
      fi
      git commit -m "sync submodules"
      git push