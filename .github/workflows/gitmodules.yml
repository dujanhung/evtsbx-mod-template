name: gitmodules pipeline
on:
 workflow_dispatch:
jobs:
 clone:
  runs-on: ubuntu-latest
  steps:
   - name: checkout repo
     uses: actions/checkout@v4
     with:
      fetch-depth: 0
   - name: clone submodules
     run: |
      mkdir addons
      git submodule add https://github.com/dujanhung/extra-lua-preset addons/extra-lua-preset
      git submodule add https://github.com/dujanhung/evtsbx-mod-lua-preset addons/extra-lua-preset
      git submodule init
      git submodule update --remote
   - name: commit
     run: |
      git config --local user.name "dujanhung"
      git config --local user.email "chanhung2008.duong@gmail.com"
      git commit -m "sync submodules"
      git push