name: Gitmodules Pipeline
on:
 workflow_dispatch:
 push:
  paths:
   - ".gitmodules"
 pull_request:
  paths:
   - ".gitmodules"
jobs:
 check-files:
  runs-on: ubuntu-latest
  steps:
   - name: Checkout repository
     uses: actions/checkout@v4
   - name: Ensure required files exist
     run: |
      REQUIRED_FILES=(
       ".gitmodules"
       ".github/scripts/validate_gitmodules.py"
       ".github/scripts/prepare_folders.py"
       ".github/scripts/clone_submodules.sh"
      )
      for file in "${REQUIRED_FILES[@]}"; do
       if [ ! -f "$file" ]; then
        echo "ERROR: Required file missing: $file"
        exit 1
       fi
      done
      echo "All required files found."
 validate-scripts:
  runs-on: ubuntu-latest
  needs: check-files
  steps:
   - name: Checkout repository
     uses: actions/checkout@v4
   - name: Set up Python
     uses: actions/setup-python@v5
     with:
      python-version: "3.x"
   - name: Validate Python syntax
     run: |
      python -m py_compile .github/scripts/validate_gitmodules.py
      python -m py_compile .github/scripts/prepare_folders.py
   - name: Validate shell syntax
     run: |
      bash -n .github/scripts/clone_submodules.sh
 make-executable:
  runs-on: ubuntu-latest
  needs: validate-scripts
  steps:
   - name: Checkout repository
     uses: actions/checkout@v4
   - name: Make Bash scripts executable
     run: |
      find .github/scripts -type f -name "*.sh" -exec chmod +x {} \;
   - name: Verify permissions
     run: |
      ls -l .github/scripts/*.sh
 validate-gitmodules:
  runs-on: ubuntu-latest
  needs: make-executable
  steps:
   - name: Checkout repository
     uses: actions/checkout@v4
   - name: Validate .gitmodules
     run: python .github/scripts/validate_gitmodules.py
 prepare:
  runs-on: ubuntu-latest
  needs: validate-gitmodules
  steps:
   - name: Checkout repository
     uses: actions/checkout@v4
   - name: Prepare folders
     run: python .github/scripts/prepare_folders.py
 clone:
  runs-on: ubuntu-latest
  needs: prepare
  steps:
   - name: Checkout repository
     uses: actions/checkout@v4
     with:
      fetch-depth: 0
   - name: Clone submodules
     run: ./.github/scripts/clone_submodules.sh
 cleanup-placeholders:
  runs-on: ubuntu-latest
  needs: clone
  steps:
   - name: Checkout repository
     uses: actions/checkout@v4
   - name: Remove placeholder files
     run: |
      find . -type f -name "a.txt" -delete
   - name: Verify cleanup
     run: |
      if find . -type f -name "a.txt" | grep -q .; then
       echo "ERROR: Some a.txt files still exist"
       exit 1
      fi
      echo "All placeholder files removed."