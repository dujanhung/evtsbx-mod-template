name: pack repo
on:
 workflow_dispatch:
env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
 pack-zip:
  runs-on: ubuntu-latest
  steps:
   - name: get checkout
     uses: actions/checkout@v5
   - name: add submodules
     run: |
      mkdir addons
      cd addons
      git submodule add https://github.com/dujanhung/extra-lua-preset
      git submodule add https://github.com/dujanhung/evtsbx-mod-lua-preset
      cd .
   - name: create ZIP file
     run: |
      zip -r -9 evtsbx-mod-template.zip . -x ".github/*" -x "*/.github/*" -x ".git/*" -x "*/.git" -x ".gitmodules" -x "*/.gitmodules" -x "*.md"
   - name: upload ZIP file
     uses: actions/upload-artifact@v6
     with:
      name: evtsbx-mod-template
      path: evtsbx-mod-template.zip
      compression-level: 9