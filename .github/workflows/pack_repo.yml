name: pack repo
on:
 workflow_dispatch:
env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
 pack-repo:
  runs-on: ubuntu-latest
  steps:
   - name: checkout repo
     uses: actions/checkout@v5
   - name: add submodules
     run: |
      mkdir addons
      cd addons
      git submodule add https://github.com/dujanhung/extra-lua-preset
      git submodule add https://github.com/dujanhung/evtsbx-mod-lua-preset
      cd .
   - name: sanitize
     run: |
      find . -type f -name "*.md" -exec rm {} \;
      find . -type f -name ".gitmodules" -exec rm {} \;
      find . -type f -name ".git" -exec rm {} \;
      find . -type d -name "*/.github" -exec rmdir {} \;
      find . -type d -name "*/.git" -exec rmdir {} \;
   - name: create root folder
     run: |
      mkdir evtsbx-mod-template
      cd evtsbx-mod-template
   - name: move everything to root folder
     run: |
      find . -type d -name "./*" ! evtsbx-mod-template -exec move {} evtsbx-mod-template \;
      move info.json evtsbx-mod-template
   - name: upload artifact
     uses: actions/upload-artifact@v6
     with:
      name: evtsbx-mod-template
      path: evtsbx-mod-template.zip
      compression-level: 9