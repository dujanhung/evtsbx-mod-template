name: pack repo
on:
 workflow_dispatch:
env:
 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
 pack-repo:
  runs-on: ubuntu-latest
  steps:
   - name: checkout repo
     uses: actions/checkout@v5
   - name: add submodules
     run: |
      cd .
      mkdir addons
      cd addons
      git submodule add https://github.com/dujanhung/extra-lua-preset
      git submodule add https://github.com/dujanhung/evtsbx-mod-lua-preset
      cd .
   - name: sanitize
     run: |
      find . -type f -name "*.md" -exec rm {} \;
      find . -type f -name ".gitmodules" -exec rm {} \;
      find . -type f -name ".git" -exec rm {} \;
      find . -type d -name "*/.github" -exec rmdir {} \;
      find . -type d -name "*/.git" -exec rmdir {} \;
   - name: move
     run: |
      cd .
      mkdir evtsbx-mod-template
      find . -mindepth 1 -maxdepth 1 ! -name "./evtsbx-mod-template/" -exec mv -- {} "./evtsbx-mod-template/" \;
      cd .
   - name: list
     run: |
      echo "."
      ls -m .
      echo "evtsbx-mod-template"
      ls -m "./evtsbx-mod-template/"
   - name: upload artifact
     uses: actions/upload-artifact@v6
     with:
      name: evtsbx-mod-template
      path: .
      compression-level: 9